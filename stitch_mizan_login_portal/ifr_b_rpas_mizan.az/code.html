<html lang="az"><head>

                        "on-primary-container": "#602b00",
                        "inverse-surface": "#2e3229",

                        "on-secondary": "#ffffff",

<style>
        body {
            background-color: #e2e4d7; /* Fallback surface-vapor */
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .bg-gradient-mesh {
            background: radial-gradient(circle at 10% 20%, rgba(193, 197, 182, 0.4) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(118, 145, 155, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(240, 138, 66, 0.05) 0%, transparent 60%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px) saturate(110%);
            -webkit-backdrop-filter: blur(24px) saturate(110%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(25, 33, 32, 0.04);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #c1c5b6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #76919b;
            box-shadow: 0 0 0 4px rgba(118, 145, 155, 0.1);
            outline: none;
        }

        .btn-glow {
            box-shadow: 0 4px 15px rgba(152, 72, 0, 0.2);
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            box-shadow: 0 6px 25px rgba(152, 72, 0, 0.3);
            transform: translateY(-1px);
        }

        .btn-glow:active {
            transform: translateY(0px);
        }

        .success-banner {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .success-banner.visible {
            max-height: 100px;
            opacity: 1;
            margin-bottom: 24px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-margin-mobile">
<!-- Animated Background Mesh Elements -->
<div class="fixed inset-0 -z-10 bg-surface-vapor bg-gradient-mesh overflow-hidden">
<div class="absolute -top-1/4 -left-1/4 w-[70vw] h-[70vw] rounded-full bg-sage/20 blur-[120px] animate-pulse"></div>
<div class="absolute -bottom-1/4 -right-1/4 w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed-dim/20 blur-[100px] animate-pulse" style="animation-delay: 2s;"></div>
</div>
<!-- Main Auth Card -->
<main class="glass-card w-full max-w-[440px] rounded-3xl p-margin-mobile md:p-12 z-10" id="auth-card">
<!-- Brand Identity / Badge -->
<div class="flex justify-center mb-8">
<div class="w-20 h-20 rounded-2xl bg-white/60 backdrop-blur-md p-3 border border-white/50 shadow-sm flex items-center justify-center">
<img alt="Mizan Logo" class="w-full h-full object-contain grayscale-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpIDs8vVMJesAejIRzLjiOQbtKmWeH2KuWTH_ggBhspDzFniqkd72YdjhHCGdIa9KeRKLsEJR-zzzbhe4pK_q_BFEhv4cpvh2d_cTr6xDvn7CTsWpg2k07JTfr81wl7zFYMnZtX_dAqKR0MTlPg1q-Mi42z12PXSJTR040IqZNTIuOAGujYacuv3eUp76xsjfR8xc-CA0SpPOffJL25ZrB9Lgu5G8ffKZxz6NBF3Suubhp3fRy7Xt6mDPNDtQnKxAGpYmV5CFMwg"/>
</div>
</div>
<!-- Content -->
<div class="text-center mb-10">
<h1 class="font-headline-md text-headline-md text-depth tracking-tight mb-2">Şifrənizi bərpa edin</h1>
<p class="font-body-md text-body-md text-slate leading-relaxed">
                Email ünvanınızı daxil edin, şifrə yeniləmə üçün təlimat göndərək.
            </p>
</div>
<!-- Success Message Placeholder (Initially Hidden) -->
<div class="success-banner" id="success-msg">
<div class="bg-surface-container-low/80 border border-sage/50 p-4 rounded-xl flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-label-md text-label-md text-on-surface">
                    Əgər bu email sistemdə mövcuddursa, bərpa linki göndəriləcək.
                </p>
</div>
</div>
<!-- Form -->
<form class="space-y-6" id="forgot-password-form" onsubmit="handleSubmit(event)">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate/60 text-[20px]">mail</span>
<input class="glass-input w-full pl-12 pr-4 py-3.5 rounded-xl font-body-md text-body-md text-on-surface placeholder:text-slate/40" id="email" placeholder="Email ünvanınızı daxil edin" required="" type="email"/>
</div>
</div>
<button class="btn-glow w-full bg-primary text-white py-4 rounded-xl font-headline-sm text-headline-sm transition-all flex items-center justify-center gap-2 group" type="submit">
                Bərpa linki göndər
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Actions -->
<footer class="mt-10 text-center">
<p class="font-body-md text-body-md text-carbon">
                Şifrənizi xatırladınız? 
                <a class="text-primary font-bold hover:underline ml-1 transition-all" href="#">Daxil olun</a>
</p>
</footer>
</main>
<!-- Floating Atmosphere Elements -->
<div class="fixed bottom-margin-desktop left-margin-desktop hidden md:block opacity-50">
<div class="flex items-center gap-2 text-slate font-label-sm">
<span class="material-symbols-outlined text-[16px]">lock_reset</span>
            Təhlükəsiz bərpa sistemi
        </div>
</div>
<script>
        function handleSubmit(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button');
            const successMsg = document.getElementById('success-msg');
            const emailInput = document.getElementById('email');
            
            // UI Feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Göndərilir...';
            btn.classList.add('opacity-80', 'pointer-events-none');

            // Simulate Network Delay
            setTimeout(() => {
                successMsg.classList.add('visible');
                btn.innerHTML = 'Email göndərildi';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-tertiary', 'opacity-100');
                emailInput.value = '';
                
                // Visual reset after some time
                setTimeout(() => {
                    btn.innerHTML = 'Bərpa linki göndər <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>';
                    btn.classList.add('bg-primary');
                    btn.classList.remove('bg-tertiary', 'pointer-events-none');
                }, 5000);
            }, 1200);
        }

        // Ambient movement for background blobs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const card = document.getElementById('auth-card');
            const rotationX = (y - 0.5) * 4;
            const rotationY = (x - 0.5) * -4;
            
            card.style.transform = `perspective(1000px) rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
        });
    </script>
</body></html>
