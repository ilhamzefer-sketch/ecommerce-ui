<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #e2e4d7 0%, #c1c5b6 100%);
        }

        .bg-glow-top {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(193, 197, 182, 0.4) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }

        .bg-glow-bottom {
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(226, 228, 215, 0.5) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.12);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #c1c5b6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #f08a42;
            box-shadow: 0 0 0 4px rgba(240, 138, 66, 0.15);
            outline: none;
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, #f08a42 0%, #e67a2e 100%);
            box-shadow: 0 8px 24px -6px rgba(240, 138, 66, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px -8px rgba(240, 138, 66, 0.6);
            filter: brightness(1.05);
        }

        .btn-primary-gradient:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center relative bg-[#f9fbed]">
<div class="bg-glow-top"></div>
<div class="bg-glow-bottom"></div>
<main class="w-full max-w-[460px] animate-fade-in z-10 px-6">
<div class="glass-card rounded-[32px] p-10 md:p-12">
<header class="flex flex-col items-center mb-10 text-center">
<div class="mb-8 w-[140px]">
<img alt="Mizan.az Logo" class="w-full h-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_C8pX6Cq8KQ8Uv2udqPgndVzXx7zLaKUWJuk5mwzWQQjKcRaXDCTxCa7LlpzxPsMI1Ol-WttG3LmXNirx1Xks2sceektTEfdN_OrzBNnX6Zx13-aj9UF1WQIcPAQUYOtL9_8UZN8moAURJOT7Eh3tmcV8cyKtFr2Fp3PAIxAy0Rp_GbdOybW6IDTJ7pntlzPcrOa6CIUN6zrkg-Rou0GtBjyKRU-yI6VWFx3lQliX6JpjLgwCUb5G849eFNqnD4OHElCy8CX0yA"/>
</div>
<h1 class="font-headline-md text-[26px] font-bold text-[#192120] mb-3 tracking-tight">Hesabınıza daxil olun</h1>
<p class="font-body-md text-[15px] text-[#434942] opacity-80 leading-relaxed max-w-[280px]">
                    Mizan.az-da doğru seçim və etibarlı alış üçün daxil olun.
                </p>
</header>
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="font-label-md text-label-md text-[#192120] block pl-1 opacity-90" for="username">Email və ya istifadəçi adı</label>
<input class="input-glass w-full h-[48px] px-5 rounded-2xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30" id="username" placeholder="Email və ya istifadəçi adınızı daxil edin" type="text"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center pl-1">
<label class="font-label-md text-label-md text-[#192120] opacity-90" for="password">Şifrə</label>
<a class="font-label-md text-[13px] text-primary hover:opacity-70 transition-opacity" href="#">Şifrəni unutmusunuz?</a>
</div>
<div class="relative group">
<input class="input-glass w-full h-[48px] px-5 pr-12 rounded-2xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30" id="password" placeholder="Şifrənizi daxil edin" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="btn-primary-gradient w-full h-[50px] rounded-2xl font-label-md text-[15px] font-bold text-white mt-4" type="submit">
                    Daxil ol
                </button>
</form>
<footer class="mt-10 text-center">
<p class="font-body-md text-[14px] text-[#434942]">
                    Hesabınız yoxdur? 
                    <a class="text-primary font-bold hover:underline decoration-primary/30 underline-offset-4 transition-all ml-1" href="#">Qeydiyyatdan keçin</a>
</p>
</footer>
</div>
</main>
<div class="fixed bottom-12 left-0 right-0 flex justify-center space-x-8 text-[#434942]/50 font-label-md text-[13px] z-10">
<a class="hover:text-primary transition-colors duration-300" href="#">Məxfilik siyasəti</a>
<a class="hover:text-primary transition-colors duration-300" href="#">Dəstək</a>
<a class="hover:text-primary transition-colors duration-300" href="#">İstifadə şərtləri</a>
</div>
<script>
        // Password visibility toggle
        document.addEventListener('DOMContentLoaded', () => {
            const togglePassBtn = document.querySelector('button span.material-symbols-outlined').parentElement;
            const passInput = document.getElementById('password');
            if (togglePassBtn && passInput) {
                togglePassBtn.addEventListener('click', () => {
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    togglePassBtn.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
                });
            }
        });
    </script>
</body></html>
