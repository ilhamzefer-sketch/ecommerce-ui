<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #e2e4d7;
            overflow-x: hidden;
        }

        .bg-shader {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #e2e4d7;
            overflow: hidden;
        }

        .glow-1 {
            position: absolute;
            width: 800px;
            height: 800px;
            top: -200px;
            left: -100px;
            background: radial-gradient(circle, rgba(193, 197, 182, 0.4) 0%, rgba(193, 197, 182, 0) 70%);
            filter: blur(80px);
            animation: drift 25s infinite alternate ease-in-out;
        }

        .glow-2 {
            position: absolute;
            width: 1000px;
            height: 1000px;
            bottom: -300px;
            right: -200px;
            background: radial-gradient(circle, rgba(118, 145, 155, 0.3) 0%, rgba(118, 145, 155, 0) 70%);
            filter: blur(100px);
            animation: drift 30s infinite alternate-reverse ease-in-out;
        }

        .glow-3 {
            position: absolute;
            width: 600px;
            height: 600px;
            top: 20%;
            right: 15%;
            background: radial-gradient(circle, rgba(240, 138, 66, 0.1) 0%, rgba(240, 138, 66, 0) 70%);
            filter: blur(120px);
            animation: pulse 15s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }

        @keyframes pulse {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.2); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: 0 8px 32px 0 rgba(25, 33, 32, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .input-glow:focus {
            box-shadow: 0 0 0 4px rgba(240, 138, 66, 0.15);
            border-color: #f08a42;
        }

        .cta-gradient {
            background: linear-gradient(135deg, #f08a42 0%, #d47333 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cta-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(240, 138, 66, 0.3);
        }

        .cta-gradient:active {
            transform: translateY(0);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<div class="bg-shader">
<div class="glow-1"></div>
<div class="glow-2"></div>
<div class="glow-3"></div>
</div>
<main class="w-full max-w-[520px] glass-card rounded-card p-[48px] animate-in fade-in zoom-in duration-700">
<div class="flex flex-col items-center mb-10">
<div class="bg-white/40 p-4 rounded-full backdrop-blur-md border border-white/60 mb-6">
<img alt="Mizan.az" class="h-12 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC90GfQXV4v4SESOtDXMWkIqrGDA95BY6s3rig-1V2Pj1YIJ1cxfeM70PnU2Jg-shUYR9D4HSKh-sifZh3XjsnJMxbZAOf4S7ihUetyvtoLA-WSk4fo-R3ooKUYuOGYaJGb8s9fwmHieK5WUMxFb9tFrZ576BfsSGOqfxsHPyUztyA5OGOckzfljKyokT1NeuOedg4oIR7jopLlPj15H9NmaHb93jYzlUYjH6YUpITHruUalC5ovp6G5Khy6Ov0ENtJ6NP04lj62A"/>
</div>
<h1 class="text-headline-md font-headline-md text-depth mb-3 tracking-tight">Yeni hesab yaradın</h1>
<p class="text-body-md font-body-md text-slate text-center leading-relaxed">
                Mizan.az-da etibarlı alış təcrübəsinə başlamaq üçün qeydiyyatdan keçin.
            </p>
</div>
<form class="space-y-5" id="registration-form">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-carbon px-1" for="first-name">Ad</label>
<input class="w-full h-[48px] px-4 rounded-input bg-white/40 border border-sage outline-none input-glow transition-all duration-200 text-body-md font-body-md placeholder:text-slate/60" id="first-name" placeholder="Adınız" type="text"/>
</div>
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-carbon px-1" for="last-name">Soyad</label>
<input class="w-full h-[48px] px-4 rounded-input bg-white/40 border border-sage outline-none input-glow transition-all duration-200 text-body-md font-body-md placeholder:text-slate/60" id="last-name" placeholder="Soyadınız" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-carbon px-1" for="username">İstifadəçi adı</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate text-[20px]">person</span>
<input class="w-full h-[48px] pl-11 pr-4 rounded-input bg-white/40 border border-sage outline-none input-glow transition-all duration-200 text-body-md font-body-md placeholder:text-slate/60" id="username" placeholder="İstifadəçi adınız" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-carbon px-1" for="email">Email</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate text-[20px]">mail</span>
<input class="w-full h-[48px] pl-11 pr-4 rounded-input bg-white/40 border border-sage outline-none input-glow transition-all duration-200 text-body-md font-body-md placeholder:text-slate/60" id="email" placeholder="nümunə@mizan.az" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-carbon px-1" for="password">Şifrə</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate text-[20px]">lock</span>
<input class="w-full h-[48px] pl-11 pr-12 rounded-input bg-white/40 border border-sage outline-none input-glow transition-all duration-200 text-body-md font-body-md placeholder:text-slate/60" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full h-[52px] rounded-button cta-gradient text-white font-headline-sm text-headline-sm flex items-center justify-center gap-2" type="submit">
<span>Qeydiyyatdan keç</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-sage/30 text-center">
<p class="text-body-md font-body-md text-slate">
                Artıq hesabınız var? 
                <a class="text-primary-container font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Daxil olun</a>
</p>
</div>
</main>
<footer class="fixed bottom-6 w-full text-center pointer-events-none opacity-40">
<p class="text-label-sm font-label-sm text-depth">© 2024 Mizan.az. Bütün hüquqlar qorunur.</p>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        document.getElementById('registration-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Uğurludur!</span>';
                btn.classList.remove('cta-gradient');
                btn.classList.add('bg-green-600');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.add('cta-gradient');
                    btn.classList.remove('bg-green-600');
                }, 2000);
            }, 1500);
        });

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.space-y-2').querySelector('label')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.space-y-2').querySelector('label')?.classList.remove('text-primary');
            });
        });
    </script>
</body></html>
