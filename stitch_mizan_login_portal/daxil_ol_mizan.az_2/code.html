<style>
        .glass-panel {
            background: rgba(226, 228, 215, 0.4); /* surface-variant base approximation */

            -webkit-backdrop-filter: blur(12px);

<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden font-body-md text-primary-container">
<!-- Ambient Background Blobs for Depth -->
<div class="absolute top-0 left-0 w-[500px] h-[500px] bg-on-tertiary-container/10 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-[600px] h-[600px] bg-primary-fixed-dim/20 rounded-full blur-[120px] translate-x-1/3 translate-y-1/3 pointer-events-none"></div>
<!-- Main Login Container -->
<main class="glass-panel w-full max-w-[440px] rounded-[24px] p-8 md:p-10 relative z-10 flex flex-col items-center">
<!-- Logo -->
<div class="mb-lg w-full flex justify-center">
<img alt="Mizan.az Logo" class="h-16 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdl9IqVmFA9wviYhvrCNTXd_a-vtXRpr0aiqFKU6mRsDiwP7a_BzXZmS_75eIkPYu8I6rt_tb2opT8HPSuBnIaU9PyMQ_wHH2iGOVP0U25sWsB6UA1V1xumufkM8fssIcltQJo0g6drpBHLAvzZicZlkbUJCCHLUPUKPRpGsm2_Bu2oz0jXtNTTWC6hKV63chdMf5_O18ZB3tBwc0kBujiWF0ErnWVjtgDemos7_WiMJ_T336ZXuVTAYrp5nf2mskvvG_CNPBxkg"/>
</div>
<!-- Header -->
<div class="text-center mb-xl w-full">
<h1 class="font-headline-xl text-headline-xl text-primary-container mb-sm">Hesabınıza daxil olun</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Mizan.az-da doğru seçim və etibarlı alış üçün daxil olun.</p>
</div>
<!-- Form -->
<form action="#" class="w-full flex flex-col gap-md" method="POST">
<!-- Email / Username Input -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email və ya istifadəçi adı</label>
<input class="w-full bg-primary-fixed-dim/20 border-0 border-b-2 border-on-surface-variant focus:border-secondary-container focus:ring-0 rounded-t-lg px-4 py-3 font-body-md text-primary-container placeholder-on-surface-variant/50 transition-colors" id="email" name="email" placeholder="Email və ya istifadəçi adınızı daxil edin" type="text"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Şifrə</label>
<div class="relative">
<input class="w-full bg-primary-fixed-dim/20 border-0 border-b-2 border-on-surface-variant focus:border-secondary-container focus:ring-0 rounded-t-lg px-4 py-3 pr-12 font-body-md text-primary-container placeholder-on-surface-variant/50 transition-colors" id="password" name="password" placeholder="Şifrənizi daxil edin" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary-container transition-colors focus:outline-none" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="visibilityIcon">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-2">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-secondary-container transition-colors" href="#">Şifrəni unutmusunuz?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary-container text-on-primary font-label-lg text-label-lg py-4 rounded-lg mt-sm hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-background" type="submit">
                Daxil ol
            </button>
</form>
<!-- Footer / Sign Up Link -->
<div class="mt-lg text-center font-body-sm text-body-sm text-on-surface-variant">
<span>Hesabınız yoxdur?</span>
<a class="font-label-lg text-label-lg text-primary-container ml-1 hover:text-secondary-container transition-colors" href="#">Qeydiyyatdan keçin</a>
</div>
</main>
<script>
        // Password Visibility Toggle Logic
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const visibilityIcon = document.getElementById('visibilityIcon');

        togglePasswordBtn.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle icon
            if (type === 'password') {
                visibilityIcon.textContent = 'visibility_off';
            } else {
                visibilityIcon.textContent = 'visibility';
            }
        });
    </script>
