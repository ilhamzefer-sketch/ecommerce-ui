<style>
        body {
            background-color: #f9fbed;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(25, 33, 32, 0.05);
        }

        .glass-badge {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border: 1.5px solid #c1c5b6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #984800;
            box-shadow: 0 0 0 4px rgba(152, 72, 0, 0.08);
            outline: none;
        }

        .gradient-sphere {
            position: absolute;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.3;
        }

        .primary-button {
            background: #984800;
            box-shadow: 0 4px 14px 0 rgba(152, 72, 0, 0.3);
            transition: all 0.3s ease;
        }

        .primary-button:hover {
            background: #733500;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(152, 72, 0, 0.4);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-0 relative bg-surface-vapor">
<!-- Decorative Gradient Blurs -->
<div class="gradient-sphere w-[500px] h-[500px] bg-tertiary-container top-[-10%] left-[-10%] animate-pulse"></div>
<div class="gradient-sphere w-[600px] h-[600px] bg-primary-fixed bottom-[-15%] right-[-5%]"></div>
<div class="gradient-sphere w-[400px] h-[400px] bg-sage top-[20%] right-[10%] opacity-20"></div>
<!-- Main Auth Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Badge -->
<div class="glass-badge p-4 rounded-full mb-8 shadow-sm">
<img alt="Mizan.az Logo" class="w-16 h-16 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpIDs8vVMJesAejIRzLjiOQbtKmWeH2KuWTH_ggBhspDzFniqkd72YdjhHCGdIa9KeRKLsEJR-zzzbhe4pK_q_BFEhv4cpvh2d_cTr6xDvn7CTsWpg2k07JTfr81wl7zFYMnZtX_dAqKR0MTlPg1q-Mi42z12PXSJTR040IqZNTIuOAGujYacuv3eUp76xsjfR8xc-CA0SpPOffJL25ZrB9Lgu5G8ffKZxz6NBF3Suubhp3fRy7Xt6mDPNDtQnKxAGpYmV5CFMwg"/>
</div>
<!-- Glass Card -->
<div class="glass-card w-full rounded-[32px] p-12 flex flex-col">
<div class="text-center mb-10">
<h1 class="font-headline-md text-headline-md text-on-surface mb-3">Yeni şifrə yaradın</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Hesabınızı qorumaq üçün güclü və yadda qalan yeni şifrə seçin.</p>
</div>
<form class="space-y-6" id="resetForm" onsubmit="return false;">
<!-- New Password Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="password">Yeni şifrə</label>
<div class="relative">
<input class="glass-input w-full h-14 rounded-xl px-4 pr-12 font-body-md text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate hover:text-primary transition-colors" onclick="toggleVisibility('password')" type="button">
<span class="material-symbols-outlined" id="password-icon">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="confirmPassword">Şifrəni təkrar edin</label>
<div class="relative">
<input class="glass-input w-full h-14 rounded-xl px-4 pr-12 font-body-md text-on-surface" id="confirmPassword" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate hover:text-primary transition-colors" onclick="toggleVisibility('confirmPassword')" type="button">
<span class="material-symbols-outlined" id="confirmPassword-icon">visibility</span>
</button>
</div>
</div>
<!-- Helper Text -->
<div class="flex items-start gap-2 text-slate">
<span class="material-symbols-outlined text-[18px]">info</span>
<p class="font-label-sm text-label-sm">Şifrə minimum 8 simvoldan ibarət olmalıdır.</p>
</div>
<!-- Submit Button -->
<button class="primary-button w-full h-14 rounded-xl text-on-primary font-label-md flex items-center justify-center gap-2 group mt-4" type="submit">
<span>Şifrəni yenilə</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-on-surface-variant">
                Artıq hesabınıza giriş edə bilərsiniz? 
                <a class="text-primary font-bold hover:underline transition-all ml-1" href="#">Daxil olun</a>
</p>
</div>
</main>
<script>
        function toggleVisibility(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Simple button micro-interaction
        const button = document.querySelector('.primary-button');
        button.addEventListener('mousedown', () => {
            button.style.transform = 'scale(0.98)';
        });
        button.addEventListener('mouseup', () => {
            button.style.transform = 'translateY(-2px) scale(1)';
        });

        // Background movement effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const spheres = document.querySelectorAll('.gradient-sphere');
            spheres.forEach((sphere, index) => {
                const moveX = (x - 0.5) * (index + 1) * 20;
                const moveY = (y - 0.5) * (index + 1) * 20;
                sphere.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body></html>
