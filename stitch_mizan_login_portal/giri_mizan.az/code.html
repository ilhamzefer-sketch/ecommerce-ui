<!-- Header -->
<div class="text-center mb-8 space-y-2">
<h1 class="font-headline-md text-headline-md text-depth">Hesabınıza daxil olun</h1>
<p class="font-body-md text-body-md text-carbon">Mizan.az-da doğru seçim və etibarlı alış üçün davam edin.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" id="loginForm" method="POST">
<!-- Email Field -->
<div class="space-y-1">
<label class="block font-label-md text-label-md text-depth" for="email">Email və ya istifadəçi adı</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-white border border-sage rounded-lg font-body-md text-body-md text-depth placeholder:text-slate focus:outline-none focus:border-[#76919b] focus:ring-2 focus:ring-[#76919b]/20 transition-all duration-200" id="email" name="email" placeholder="Nümunə: user@example.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="block font-label-md text-label-md text-depth" for="password">Şifrə</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-white border border-sage rounded-lg font-body-md text-body-md text-depth placeholder:text-slate focus:outline-none focus:border-[#76919b] focus:ring-2 focus:ring-[#76919b]/20 transition-all duration-200 pr-12" id="password" name="password" placeholder="Şifrənizi daxil edin" type="password"/>
<button class="absolute inset-y-0 right-0 px-3 flex items-center text-slate hover:text-depth transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-slate hover:text-primary-container transition-colors duration-200" href="#">
                    Şifrəni unutmusunuz?
                </a>
</div>
<!-- Error Message Placeholder (Hidden by default, inline style for demo if needed, but controlled by JS class normally) -->
<div class="hidden flex items-center gap-2 p-3 bg-error-container/50 border border-error/20 rounded-lg text-error font-label-md text-label-md" id="errorMessage">
<span class="material-symbols-outlined text-[18px]" data-icon="error">error</span>
<span>Email və ya şifrə yanlışdır.</span>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-white bg-primary-container hover:bg-primary transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container active:scale-[0.98]" id="submitBtn" type="submit">
<span id="btnText">Daxil ol</span>
<div class="hidden spinner ml-2" id="btnSpinner"></div>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-carbon">
                Hesabınız yoxdur? 
                <a class="font-label-md text-label-md text-primary-container hover:text-primary font-semibold transition-colors duration-200" href="#">
                    Qeydiyyatdan keçin
                </a>
</p>
</div>
</main>
<!-- Bottom minimalist branding / copyright to anchor the page -->
<div class="mt-12 text-center text-slate font-label-sm text-label-sm max-w-sm mx-auto">
        © 2024 Mizan.az. Bütün hüquqlar qorunur. Təhlükəsiz və şifrələnmiş bağlantı.
    </div>
<script>
        // Password Visibility Toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
                eyeIcon.setAttribute('data-icon', 'visibility_off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
                eyeIcon.setAttribute('data-icon', 'visibility');
            }
        }

        // Form Submit Simulation (Loading & Error states)
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reset error state
            errorMessage.classList.add('hidden');
            
            // Set loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = 'Daxil olunur...';
            btnSpinner.classList.remove('hidden');

            // Simulate API call delay
            setTimeout(() => {
                // Remove loading state
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.textContent = 'Daxil ol';
                btnSpinner.classList.add('hidden');
                
                // Show error state for demo purposes
                errorMessage.classList.remove('hidden');
                
                // Optional: add shake animation to the form or fields
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    input.classList.add('border-error/50');
                    setTimeout(() => input.classList.remove('border-error/50'), 2000);
                });
                
            }, 1500);
        });
    </script>
</body></html>
