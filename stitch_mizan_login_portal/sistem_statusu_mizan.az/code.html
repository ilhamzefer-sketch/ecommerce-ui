<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(193, 197, 182, 0.3);
            box-shadow: 0 8px 32px 0 rgba(25, 33, 32, 0.05);
        }

        .status-pulse {
            position: relative;
        }

        .status-pulse::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: inherit;
            animation: pulse-ring 2.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.7); opacity: 0.8; }
            80%, 100% { transform: scale(2.4); opacity: 0; }
        }

        .mesh-bg {
            background-color: #f9fbed;
            background-image: 
                radial-gradient(at 0% 0%, rgba(226, 228, 215, 0.8) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(193, 197, 182, 0.4) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(152, 72, 0, 0.05) 0, transparent 50%), 
                radial-gradient(at 0% 100%, rgba(226, 228, 215, 0.6) 0, transparent 50%);
        }
    </style>

<div class="fixed top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-tertiary/10 rounded-full blur-[100px] pointer-events-none"></div>
<script>
        // Simple micro-interaction for the timestamp
        function updateTimestamp() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('az-AZ', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('timestamp').innerText = `Bugün, ${timeString}`;
        }
        updateTimestamp();
        
        // Add a subtle parallax effect to the card on mouse move
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseenter', () => {
            card.style.transition = "none";
        });

        document.addEventListener('mouseleave', () => {
            card.style.transition = "all 0.5s ease";
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
