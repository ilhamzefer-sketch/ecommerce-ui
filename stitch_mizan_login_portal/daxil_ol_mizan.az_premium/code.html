<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9fbed;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .bg-gradient-mesh {
            background: radial-gradient(circle at 10% 20%, #e2e4d7 0%, #f9fbed 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .blur-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        .orb-1 { width: 600px; height: 600px; background: #434942; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #c1c5b6; bottom: -100px; right: -100px; }
        .orb-3 { width: 300px; height: 300px; background: #f08a42; top: 40%; left: 60%; }

        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(25, 33, 32, 0.1);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid #c1c5b6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.6);
            border-color: #f08a42;
            box-shadow: 0 0 0 4px rgba(240, 138, 66, 0.1);
            outline: none;
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, #f08a42 0%, #e67a2e 100%);
            box-shadow: 0 10px 20px -5px rgba(240, 138, 66, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 30px -8px rgba(240, 138, 66, 0.4);
        }

        .btn-primary-gradient:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="bg-gradient-mesh"></div>
<div class="blur-orb orb-1"></div>
<div class="blur-orb orb-2"></div>
<div class="blur-orb orb-3"></div>
<main class="w-full max-w-[440px] animate-[fadeIn_0.6s_ease-out]">
<div class="glass-card rounded-[32px] p-8 md:p-12">
<header class="flex flex-col items-center mb-10 text-center">
<div class="mb-8 overflow-hidden rounded-2xl w-24 h-24 flex items-center justify-center">
<img alt="Mizan.az Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRl9kx3g0Q9K0e3i5zLQjR3XYDCB4kzr3WpF8Cb_BdzysWQ_qFi19Bk6Hs4AcDtPuNg79NpsDFXAYXXbdCcpqqKrGIX05xvWclTNLVpZeUFm0n848sw_zJHac1BPkOWwwKzewQvIwmYI0V5oXu7UxjylpGEmwelT2bSKsFlsQXkRbih-0mRCuqsztHOABE9SMOPdTjdPNKzSbG0E0Y99bRo6RwXzCDuuJU5EdyvyNUO2ybnjNwV8pe15YZ-LG28fWYI08-06lvNw"/>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Hesabınıza daxil olun</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">
                    Mizan.az-da doğru seçim və etibarlı alış üçün daxil olun.
                </p>
</header>
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface" for="username">Email və ya istifadəçi adı</label>
<input class="input-glass w-full h-[52px] px-4 rounded-2xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50" id="username" placeholder="Email və ya istifadəçi adınızı daxil edin" type="text"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Şifrə</label>
<a class="font-label-md text-label-md text-primary hover:opacity-80 transition-opacity" href="#">Şifrəni unutmusunuz?</a>
</div>
<div class="relative group">
<input class="input-glass w-full h-[52px] px-4 pr-12 rounded-2xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50" id="password" placeholder="Şifrənizi daxil edin" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/70 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="btn-primary-gradient w-full h-[54px] rounded-2xl font-label-md text-label-md text-white mt-4" type="submit">
                    Daxil ol
                </button>
</form>
<footer class="mt-10 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Hesabınız yoxdur? 
                    <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 transition-all" href="#">Qeydiyyatdan keçin</a>
</p>
</footer>
</div>
<div class="mt-8 flex justify-center space-x-6 text-on-surface-variant/50 font-label-sm text-label-sm">
<a class="hover:text-primary transition-colors" href="#">Məxfilik siyasəti</a>
<a class="hover:text-primary transition-colors" href="#">Dəstək</a>
<a class="hover:text-primary transition-colors" href="#">İstifadə şərtləri</a>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const orbs = document.querySelectorAll('.blur-orb');
            
            window.addEventListener('mousemove', (e) => {
                const { clientX, clientY } = e;
                const moveX = (clientX - window.innerWidth / 2) / 50;
                const moveY = (clientY - window.innerHeight / 2) / 50;

                orbs.forEach((orb, index) => {
                    const factor = (index + 1) * 0.5;
                    orb.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
                });
            });

            // Password visibility toggle
            const togglePass = document.querySelector('button span.material-symbols-outlined');
            const passInput = document.getElementById('password');
            if (togglePass && passInput) {
                togglePass.parentElement.addEventListener('click', () => {
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    togglePass.textContent = type === 'password' ? 'visibility' : 'visibility_off';
                });
            }
        });
    </script>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
